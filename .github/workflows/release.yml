name: Release

on:
  # Fire when a GitHub Release is published (UI: Releases → Draft a new release).
  # The Release creates the tag server-side; no separate tag-push trigger needed.
  release:
    types: [published]
  # Allow manual re-run without re-tagging (e.g. to retry a failed EAS build).
  workflow_dispatch:
    inputs:
      platform:
        description: Platform(s) to release
        type: choice
        # iOS auto-submits to TestFlight (ASC API key on EAS). Android
        # builds an APK that the `attach-android-apk` job downloads and
        # attaches to the GitHub Release — no auto-submit to Play until
        # a Google Play account + service-account JSON are wired up via
        # `eas credentials` (see docs/DEPLOYMENT.adoc).
        default: all
        options: [ios, android, all]

concurrency:
  group: release-${{ github.event.release.tag_name || github.ref_name }}
  cancel-in-progress: false

permissions:
  contents: write # needed to upload assets to the Release

env:
  EAS_CLI_VERSION: '18.6.0'

jobs:
  build-and-submit:
    name: EAS build & submit
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
    outputs:
      platform: ${{ steps.platform.outputs.value }}
    steps:
      - name: Verify EXPO_TOKEN is set
        run: |
          if [ -z "$EXPO_TOKEN" ]; then
            echo "::error title=Missing EXPO_TOKEN::Set EXPO_TOKEN under Settings → Secrets and variables → Actions. Generate at https://expo.dev/accounts/bengweeks/settings/access-tokens."
            exit 1
          fi

      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Set user-visible version from Release tag
        # Triggered Releases set tag_name (e.g. "v1.0.1"). Strip the leading "v"
        # and write into package.json — app.config.ts reads `version: pkg.version`,
        # so iOS CFBundleShortVersionString, Android versionName, and the in-app
        # version label (src/utils/appVersion.ts) all pick it up from the same
        # source of truth. Build numbers (CFBundleVersion / versionCode) come
        # from EAS via appVersionSource: remote + autoIncrement.
        if: github.event_name == 'release'
        run: |
          TAG="${{ github.event.release.tag_name }}"
          VERSION="${TAG#v}"
          # Strip any pre-release suffix (e.g. 1.0.0-rc1 → 1.0.0); store-side
          # versions must be strict X.Y.Z. Keep the original tag in the commit
          # history / Release page for traceability.
          VERSION="${VERSION%%-*}"
          echo "Setting version to $VERSION (from tag $TAG)"
          # `npm version --no-git-tag-version` rewrites package.json's version
          # field in place without creating a commit/tag (the Release tag
          # already exists). --allow-same-version covers the case where
          # package.json was bumped manually before tagging.
          npm version "$VERSION" --no-git-tag-version --allow-same-version
          git diff package.json

      - name: Quality gates
        run: |
          npm run typecheck
          npm run lint
          npm run format:check

      - name: Resolve platform
        id: platform
        run: |
          # On Release events the input is empty, so default to building
          # both platforms. iOS is auto-submitted to TestFlight; Android
          # is built only (no Google Play submit until creds wired), then
          # the attach-android-apk job downloads the APK and attaches it
          # to the Release page for sideloading.
          echo "value=${{ github.event.inputs.platform || 'all' }}" >> "$GITHUB_OUTPUT"

      - name: EAS build — iOS (auto-submit to TestFlight)
        if: steps.platform.outputs.value == 'ios' || steps.platform.outputs.value == 'all'
        run: |
          npx -p eas-cli@${{ env.EAS_CLI_VERSION }} eas build \
            --profile production \
            --platform ios \
            --non-interactive \
            --auto-submit

      - name: EAS build — Android (APK only, attached to Release)
        # Deliberately no --auto-submit: Google Play credentials aren't
        # wired yet (pending Play Developer account + service-account
        # JSON). The APK produced here is downloaded by the
        # `attach-android-apk` job below and attached to the Release.
        # Add `--auto-submit` here once `eas submit --platform android`
        # is configured in eas.json.
        if: steps.platform.outputs.value == 'android' || steps.platform.outputs.value == 'all'
        run: |
          npx -p eas-cli@${{ env.EAS_CLI_VERSION }} eas build \
            --profile production \
            --platform android \
            --non-interactive

  set-testflight-whats-new:
    name: Set TestFlight "What to Test"
    # iOS-only: the App Store Connect betaBuildLocalizations endpoint has no
    # Android equivalent (Play Console "What's New" is a separate flow that
    # eas submit handles natively once Android auto-submit is wired up).
    # Skip when the build job didn't include iOS.
    if: contains(fromJSON('["ios","all"]'), needs.build-and-submit.outputs.platform)
    needs: build-and-submit
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      NODE_NO_WARNINGS: '1'
    permissions:
      contents: write # to push the reset RELEASE_NOTES_NEXT.md back to main
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Need the full ref so we can commit RELEASE_NOTES_NEXT.md back to main.
          fetch-depth: 0
          token: ${{ github.token }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc
          cache: npm

      - name: Install dependencies (eas build:list needs app.config.ts)
        run: npm ci

      - name: Verify ASC API key is wired
        env:
          # The ASC API key is stored under the EXPO_ASC_* secret names (the
          # same key EAS uses for `eas submit`). Map them onto the ASC_* env
          # vars the script reads. The earlier ASC_* secret names never
          # existed, so this job silently soft-skipped and left "What to Test"
          # blank on every release until v1.2.1.
          ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.EXPO_ASC_API_KEY_P8 }}
        run: |
          # The same .p8 EAS uses for `eas submit` is needed here. This is a
          # one-time GH Secrets setup; see docs/DEPLOYMENT.adoc → "TestFlight
          # 'What to Test' automation". If absent, soft-skip rather than fail
          # the release — Ben can fill in "What to Test" manually for this build.
          if [ -z "$ASC_API_KEY_ID" ] || [ -z "$ASC_API_KEY_ISSUER_ID" ] || [ -z "$ASC_API_KEY_P8" ]; then
            echo "::warning title=ASC API key not configured::Skipping auto-populate of TestFlight 'What to Test'. Set EXPO_ASC_API_KEY_ID, EXPO_ASC_API_KEY_ISSUER_ID, EXPO_ASC_API_KEY_P8 repo secrets to enable. See docs/DEPLOYMENT.adoc."
            echo "skip=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          echo "skip=false" >> "$GITHUB_OUTPUT"
        id: gate

      - name: Resolve iOS build version from EAS
        if: steps.gate.outputs.skip != 'true'
        id: iosbuild
        run: |
          # Pick the iOS build EAS just produced for this commit. buildVersion
          # is the CFBundleVersion (the integer in parens that TestFlight shows
          # next to the X.Y.Z marketing version).
          version=$(npx -y -p eas-cli@${{ env.EAS_CLI_VERSION }} eas build:list \
            --platform ios --status finished --limit 5 --json --non-interactive \
            | jq -r --arg sha "${{ github.sha }}" \
                '[.[] | select(.gitCommitHash == $sha)][0].buildVersion // empty')
          if [ -z "$version" ] || [ "$version" = "null" ]; then
            echo "::warning title=No iOS build resolved::Could not find a finished iOS build for commit ${{ github.sha }}. Skipping whatsNew."
            echo "version=" >> "$GITHUB_OUTPUT"
          else
            echo "Resolved iOS build version: $version"
            echo "version=$version" >> "$GITHUB_OUTPUT"
          fi

      - name: Build changelog
        if: steps.gate.outputs.skip != 'true' && steps.iosbuild.outputs.version != ''
        id: changelog
        run: |
          # Capture stdout (the assembled notes) into a file; preserve newlines
          # for the GH Actions output via a heredoc-delimited multi-line value.
          node scripts/build-testflight-changelog.mjs > /tmp/whatsnew.txt
          echo "Assembled changelog:"
          cat /tmp/whatsnew.txt
          {
            echo 'whatsnew<<EOF_WHATSNEW'
            cat /tmp/whatsnew.txt
            echo 'EOF_WHATSNEW'
          } >> "$GITHUB_OUTPUT"

      - name: PATCH whatsNew via App Store Connect API
        if: steps.gate.outputs.skip != 'true' && steps.iosbuild.outputs.version != ''
        env:
          ASC_API_KEY_ID: ${{ secrets.EXPO_ASC_API_KEY_ID }}
          ASC_API_KEY_ISSUER_ID: ${{ secrets.EXPO_ASC_API_KEY_ISSUER_ID }}
          ASC_API_KEY_P8: ${{ secrets.EXPO_ASC_API_KEY_P8 }}
          ASC_APP_ID: '6762218164' # matches eas.json → submit.production.ios.ascAppId
          ASC_BUILD_VERSION: ${{ steps.iosbuild.outputs.version }}
          WHATS_NEW: ${{ steps.changelog.outputs.whatsnew }}
        run: node scripts/asc-set-whats-new.mjs

      - name: Archive notes + reset RELEASE_NOTES_NEXT.md
        # Only on a real Release (not a workflow_dispatch re-run) — we don't
        # want to re-archive the same notes twice.
        if: github.event_name == 'release' && steps.gate.outputs.skip != 'true' && steps.iosbuild.outputs.version != ''
        run: |
          tag="${{ github.event.release.tag_name }}"
          notes_file="docs/RELEASE_NOTES_NEXT.md"
          archive_file="docs/CHANGELOG.md"
          # Skip if the file is empty / placeholder (no bullets shipped).
          if ! grep -qE '^\s*[-*]\s+\S' "$notes_file"; then
            echo "No bullets to archive; skipping reset."
            exit 0
          fi
          # Prepend a new section to CHANGELOG.md.
          {
            echo "## $tag"
            echo
            cat /tmp/whatsnew.txt
            echo
            if [ -f "$archive_file" ]; then
              cat "$archive_file"
            fi
          } > "$archive_file.new"
          mv "$archive_file.new" "$archive_file"
          # Reset the next-release file to its placeholder state. Using
          # `cp` from a checked-in template avoids YAML/heredoc indentation
          # gymnastics that would otherwise prepend spaces to every line.
          cp docs/RELEASE_NOTES_NEXT.template.md "$notes_file"
          git config user.name 'github-actions[bot]'
          git config user.email '41898282+github-actions[bot]@users.noreply.github.com'
          git add "$notes_file" "$archive_file"
          git commit -m "chore(release): archive notes for $tag, reset RELEASE_NOTES_NEXT [skip ci]"
          git push origin HEAD:main

  attach-android-apk:
    name: Attach Android APK to Release
    # Only runs on an actual Release event (workflow_dispatch has no release to attach to)
    # AND only when the build job actually built for Android.
    if: github.event_name == 'release' && contains(fromJSON('["android","all"]'), needs.build-and-submit.outputs.platform)
    needs: build-and-submit
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        # eas build:list resolves the project via app.config.ts / eas.json from the repo root.
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: npm

      # eas build:list resolves the project via app.config.ts, which imports
      # from node_modules — without `npm ci` the CLI errors out and the jq
      # parse fails. This job (and the two below) failed every release for
      # this reason; the working build-and-submit job already does npm ci.
      - name: Install dependencies (eas build:list needs app.config.ts)
        run: npm ci

      - name: Resolve latest finished Android APK URL
        id: find
        env:
          # Suppress Node deprecation warnings on stdout. NODE_NO_WARNINGS
          # only handles Node-level deprecations though — eas-cli itself
          # can also print error / progress noise to stdout (`Error:
          # build:list command failed.` on transient API hiccups,
          # update-notifier banners), which is what v1.0.2-rc1 tripped on.
          # The script below captures stderr separately, retries once on
          # failure, and strips any pre-JSON prefix before jq sees it.
          NODE_NO_WARNINGS: '1'
        run: |
          set -uo pipefail

          # Pick the FINISHED Android production build for THIS commit, filtering
          # by gitCommitHash so we never grab an unrelated older build.
          #
          # This job runs right after build-and-submit, and there's a brief
          # window where the just-finished build hasn't yet surfaced as
          # "finished" in `eas build:list` (eventual consistency). A single-shot
          # query raced here on v1.2.0 and produced a spurious "No Android build
          # artifact" failure (#674). So POLL: treat both a failed call and an
          # empty/lagging result as "retry", and only error out once the poll
          # is exhausted.

          fetch() {
            local out_file="$1" err_file="$2"
            npx -y -p eas-cli@${{ env.EAS_CLI_VERSION }} eas build:list \
              --platform android --status finished --limit 5 --json \
              --non-interactive \
              > "$out_file" 2> "$err_file"
          }

          OUT=$(mktemp)
          ERR=$(mktemp)
          CLEAN=$(mktemp)
          JQERR=$(mktemp)
          url=""
          attempts=12
          for i in $(seq 1 "$attempts"); do
            if ! fetch "$OUT" "$ERR"; then
              echo "::warning title=eas build:list call failed (attempt $i/$attempts)::Transient EAS API hiccup; retrying in 20 s."
              [ "$i" -lt "$attempts" ] && sleep 20
              continue
            fi

            # Strip any non-JSON prefix lines (deprecation banners / progress
            # noise written to stdout) — keep from the first `[` line onward.
            sed -n '/^\[/,$p' "$OUT" > "$CLEAN"

            # Fail fast on a genuine jq parse error (malformed JSON / an EAS
            # CLI output-format change) instead of mistaking it for an
            # eventual-consistency empty result — otherwise a real format
            # break burns the whole poll window then fails with a misleading
            # "not surfaced yet" message.
            if ! url=$(jq -r --arg sha "${{ github.sha }}" \
                         '[.[] | select(.gitCommitHash == $sha)][0].artifacts.buildUrl // empty' \
                         "$CLEAN" 2>"$JQERR"); then
              echo "::error title=jq failed to parse eas build:list output::Likely an EAS CLI / JSON format change — logs below."
              echo "::group::jq stderr"; cat "$JQERR"; echo "::endgroup::"
              echo "::group::raw stdout"; cat "$OUT"; echo "::endgroup::"
              echo "::group::cleaned JSON"; cat "$CLEAN"; echo "::endgroup::"
              exit 1
            fi
            if [ -n "$url" ] && [ "$url" != "null" ]; then
              echo "Resolved Android APK URL on attempt $i/$attempts."
              break
            fi

            echo "::warning title=Finished Android build not surfaced yet (attempt $i/$attempts)::eas build:list has no finished build for ${{ github.sha }} yet; retrying in 20 s."
            [ "$i" -lt "$attempts" ] && sleep 20
          done

          if [ -z "$url" ] || [ "$url" = "null" ]; then
            echo "::error title=No Android build artifact for commit ${{ github.sha }} after $attempts attempts::EAS build may have failed, or build:list never surfaced it. Recent builds + last stderr dumped below."
            echo "::group::recent builds (cleaned)"
            cat "$CLEAN"
            echo "::endgroup::"
            echo "::group::last eas build:list stderr"
            cat "$ERR"
            echo "::endgroup::"
            exit 1
          fi
          echo "url=$url" >> "$GITHUB_OUTPUT"

      - name: Download APK
        run: |
          mkdir -p dist
          curl --fail --location --silent --show-error --retry 3 --retry-delay 2 \
            "${{ steps.find.outputs.url }}" \
            -o "dist/lightning-piggy-${{ github.event.release.tag_name }}.apk"
          # Verify it's actually an APK (ZIP magic bytes), not an HTML error page.
          file dist/*.apk | grep -qi 'zip\|android' || {
            echo "::error title=APK download invalid::Downloaded file does not look like an APK."
            file dist/*.apk
            exit 1
          }
          ls -la dist/

      - name: Upload APK to Release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            dist/lightning-piggy-${{ github.event.release.tag_name }}.apk \
            --repo "$GITHUB_REPOSITORY" --clobber

  sync-release-identifiers:
    name: Sync EAS build numbers into Release title
    # A TestFlight tester sees `1.0.1 (42)` (X.Y.Z + EAS build number); the
    # GH Release shows `v1.0.1-rc1`. Without correlation it's hard to tell
    # which release a given TestFlight build came from. This step rewrites
    # the Release title to embed the iOS + Android build numbers, so a
    # tester can match `(42)` in TestFlight against the title here.
    if: github.event_name == 'release'
    needs: [build-and-submit, attach-android-apk]
    runs-on: ubuntu-latest
    env:
      EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
      GH_TOKEN: ${{ github.token }}
      NODE_NO_WARNINGS: '1'
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '22.13.0'
          cache: npm

      - name: Install dependencies (eas build:list needs app.config.ts)
        run: npm ci

      - name: Resolve build numbers + edit Release title
        run: |
          # Pull the build number for this commit on each platform. Filter
          # by gitCommitHash so we don't accidentally pick up an unrelated
          # in-flight build from a parallel branch.
          ios_build=$(npx -y -p eas-cli@${{ env.EAS_CLI_VERSION }} eas build:list \
            --platform ios --status finished --limit 5 --json --non-interactive \
            | jq -r --arg sha "${{ github.sha }}" \
                '[.[] | select(.gitCommitHash == $sha)][0].buildVersion // empty')
          android_build=$(npx -y -p eas-cli@${{ env.EAS_CLI_VERSION }} eas build:list \
            --platform android --status finished --limit 5 --json --non-interactive \
            | jq -r --arg sha "${{ github.sha }}" \
                '[.[] | select(.gitCommitHash == $sha)][0].buildVersion // empty')

          # Derive the original title from the release event payload.
          # Fall back to the tag name if no title was set.
          base_title=$(gh release view "${{ github.event.release.tag_name }}" \
            --repo "$GITHUB_REPOSITORY" --json name --jq .name)
          if [ -z "$base_title" ] || [ "$base_title" = "${{ github.event.release.tag_name }}" ]; then
            base_title="${{ github.event.release.tag_name }}"
          fi

          # Compose the suffix from whichever build numbers we resolved.
          # Both should be present on a normal "all platforms" release;
          # platform-specific re-runs may legitimately have only one.
          suffix=""
          if [ -n "$ios_build" ] && [ -n "$android_build" ]; then
            suffix=" (iOS build $ios_build / Android build $android_build)"
          elif [ -n "$ios_build" ]; then
            suffix=" (iOS build $ios_build)"
          elif [ -n "$android_build" ]; then
            suffix=" (Android build $android_build)"
          fi

          if [ -z "$suffix" ]; then
            echo "::warning title=No build numbers resolved::Could not find a finished EAS build for commit ${{ github.sha }} on either platform; leaving Release title unchanged."
            exit 0
          fi

          # Idempotency: if the title already contains the build-number
          # suffix (e.g. workflow re-run), don't double-append.
          if echo "$base_title" | grep -qE '\(iOS build [0-9]+|Android build [0-9]+)'; then
            echo "Release title already has a build-number suffix; skipping rewrite."
            exit 0
          fi

          new_title="${base_title}${suffix}"
          echo "Old title: $base_title"
          echo "New title: $new_title"
          gh release edit "${{ github.event.release.tag_name }}" \
            --repo "$GITHUB_REPOSITORY" --title "$new_title"

  attach-technical-pdf:
    name: Generate & attach Technical Solution PDF
    if: github.event_name == 'release'
    runs-on: ubuntu-latest
    env:
      GH_TOKEN: ${{ github.token }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Ruby
        uses: ruby/setup-ruby@v1
        with:
          ruby-version: '3.3'

      - name: Setup Node (for the mermaid CLI)
        uses: actions/setup-node@v4
        with:
          node-version-file: .nvmrc

      - name: Install asciidoctor-pdf + asciidoctor-diagram + rouge + mermaid CLI
        run: |
          gem install asciidoctor-pdf asciidoctor-diagram rouge
          # mmdc renders DATA_STORAGE.adoc's [mermaid] blocks; generate-docs.sh
          # points its headless Chrome at docs/puppeteer-mermaid.json
          # (--no-sandbox) so it launches on the CI runner. Without this the
          # PDF job failed every release ("mmdc is not installed"). Pinned (like
          # EAS_CLI_VERSION) for reproducible release docs — 11.9.0 is the
          # version v1.3.1's PDF was generated with.
          npm install -g @mermaid-js/mermaid-cli@11.9.0

      - name: Generate PDF
        run: bash docs/generate-docs.sh

      - name: Upload PDF to Release
        run: |
          gh release upload "${{ github.event.release.tag_name }}" \
            docs/TECHNICAL_SOLUTION_DOCUMENT.pdf \
            --repo "$GITHUB_REPOSITORY" --clobber

  summary:
    name: Summary
    if: always()
    needs: [build-and-submit, attach-android-apk, attach-technical-pdf, set-testflight-whats-new]
    runs-on: ubuntu-latest
    steps:
      - name: Write summary
        run: |
          {
            echo "## Release ${{ github.event.release.tag_name || github.ref_name }}"
            echo ""
            echo "- EAS builds: https://expo.dev/accounts/bengweeks/projects/lightning-piggy-app/builds"
            echo "- Submissions: https://expo.dev/accounts/bengweeks/projects/lightning-piggy-app/submissions"
            if [ "${{ github.event_name }}" = "release" ]; then
              echo "- Release assets: ${{ github.event.release.html_url }}"
            fi
          } >> "$GITHUB_STEP_SUMMARY"
