appId: ${APP_ID:-com.lightningpiggy.app}
name: Create Nostr Account Test
---
# Tests creating a new Nostr identity from scratch
# Run: maestro test tests/e2e/test-create-account.yaml

- waitForAnimationToEnd:
    timeout: 15000

# Dismiss any alerts and navigate to Home
- tapOn:
    text: 'KEEP CURRENT'
    optional: true
- tapOn:
    text: 'UPDATE'
    optional: true
- tapOn:
    id: 'account-back-button'
    optional: true
- tapOn:
    text: 'Home tab'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Open drawer
- tapOn:
    id: 'profile-icon'
- waitForAnimationToEnd:
    timeout: 5000

# Sign out if already logged in
- tapOn:
    id: 'drawer-sign-out'
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: 'Sign Out'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Re-open drawer and go to Profile
- tapOn:
    id: 'profile-icon'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'drawer-row-profile'
- waitForAnimationToEnd:
    timeout: 3000

# Open Connect Nostr sheet
- tapOn:
    id: 'connect-nostr'
- waitForAnimationToEnd:
    timeout: 3000

# Tap Create a Nostr Account
- tapOn:
    id: 'create-account-button'
- waitForAnimationToEnd:
    timeout: 3000

# Enter a display name
- tapOn:
    id: 'create-name-input'
- inputText: 'Test User Piggy'
- pressKey: back
- waitForAnimationToEnd:
    timeout: 1000

# Submit account creation
- tapOn:
    id: 'create-account-submit'
- waitForAnimationToEnd:
    timeout: 15000

# Should show backup screen with nsec
- assertVisible:
    id: 'copy-nsec'

# Dismiss profile merge alert if it appears over the backup screen
- tapOn:
    text: 'KEEP CURRENT'
    optional: true
- tapOn:
    text: 'UPDATE'
    optional: true
- waitForAnimationToEnd:
    timeout: 2000

# Copy the nsec
- tapOn:
    id: 'copy-nsec'
- waitForAnimationToEnd:
    timeout: 2000

# Dismiss copy alert
- tapOn:
    text: 'OK'
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

# Dismiss any additional alerts
- tapOn:
    text: 'KEEP CURRENT'
    optional: true
- tapOn:
    text: 'UPDATE'
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

# Tap Done
- tapOn:
    id: 'backup-done'
- waitForAnimationToEnd:
    timeout: 3000

# Dismiss profile merge alert if it appears
- tapOn:
    text: 'KEEP CURRENT'
    optional: true
- tapOn:
    text: 'UPDATE'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Sign out the test account to clean up (if logged in)
- tapOn:
    id: 'profile-icon'
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'drawer-sign-out'
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: 'Sign Out'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
