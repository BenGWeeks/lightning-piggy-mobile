appId: com.anonymous.lightningpiggyapp
name: Add On-chain Wallet Test
---
# Tests importing an on-chain Bitcoin wallet via xpub/zpub
# Run: source .env && maestro test -e MAESTRO_XPUB="$MAESTRO_XPUB" tests/e2e/test-add-onchain-wallet.yaml
#
# NOTE: This test expects a fresh app state (no wallets configured).
# The onboarding flow is completed first, then an on-chain wallet is added.

# Wait for app to load
- waitForAnimationToEnd:
    timeout: 15000

# --- Onboarding (if shown) ---
# Tap through intro screen
- tapOn:
    text: "Let's Go"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Skip onboarding — just tap Get Started
- tapOn:
    text: 'GBP'
    optional: true
- tapOn:
    text: 'Get Started'
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# --- Home screen: Navigate to Add Wallet ---
# Swipe wallet carousel to reach the Add Wallet card
- swipe:
    start: 80%, 20%
    end: 20%, 20%
    duration: 400
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    start: 80%, 20%
    end: 20%, 20%
    duration: 400
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    start: 80%, 20%
    end: 20%, 20%
    duration: 400
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    start: 80%, 20%
    end: 20%, 20%
    duration: 400
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    start: 80%, 20%
    end: 20%, 20%
    duration: 400
- waitForAnimationToEnd:
    timeout: 1000

# Tap the Add Wallet card (by text or id)
- tapOn:
    id: 'add-wallet-card'
    optional: true
- tapOn:
    text: 'Add Wallet'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Scroll down in the bottom sheet to reveal Bitcoin option
- swipe:
    start: 50%, 80%
    end: 50%, 50%
    duration: 300
- waitForAnimationToEnd:
    timeout: 1000

# Select Bitcoin (On-chain) wallet type
- tapOn:
    id: 'wallet-type-onchain'
- waitForAnimationToEnd:
    timeout: 2000

# Enter the zpub key using the placeholder text
- tapOn:
    text: 'xpub6...'
- inputText: ${MAESTRO_XPUB}
- pressKey: back
- waitForAnimationToEnd:
    timeout: 1000

# Tap Next to proceed to alias step
- tapOn:
    text: 'Next'
- waitForAnimationToEnd:
    timeout: 2000

# Enter wallet alias
- tapOn:
    id: 'wallet-alias-input'
- inputText: 'Test BTC Wallet'
- pressKey: back
- waitForAnimationToEnd:
    timeout: 1000

# Tap Next to proceed to theme step
- tapOn:
    text: 'Next'
- waitForAnimationToEnd:
    timeout: 2000

# Tap Add Wallet / Connect button on theme step
- tapOn:
    id: 'wizard-connect-button'
- waitForAnimationToEnd:
    timeout: 10000

# Verify the on-chain wallet card is visible with "On-chain" label
- extendedWaitUntil:
    visible:
      text: 'On-chain'
    timeout: 30000

# Verify the wallet alias appears
- assertVisible:
    text: 'Test BTC Wallet'
