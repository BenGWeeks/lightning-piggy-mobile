appId: com.anonymous.lightningpiggyapp
name: Transfer On-chain to LN Test
---
# Tests transferring sats from an on-chain hot wallet to an NWC wallet via Boltz submarine swap.
# Requires: at least 1 hot wallet (mnemonic) + 1 connected NWC wallet.
# Note: Boltz minimum is ~10,000 sats. The hot wallet must have sufficient on-chain balance.
# Run: maestro test tests/e2e/test-transfer-onchain-to-ln.yaml

# Wait for app to be ready
- extendedWaitUntil:
    visible:
      id: 'tab-home'
    timeout: 40000

# Ensure we're on Home
- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 3000

# Tap Transfer button
- tapOn:
    id: 'btn-transfer'
- waitForAnimationToEnd:
    timeout: 3000

# Change source to Hot Wallet 1
- tapOn:
    id: 'transfer-source-dropdown'
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: 'transfer-source-hot-wallet-1'
- waitForAnimationToEnd:
    timeout: 1000

# Select destination: NWC wallet (Wallet 1)
- tapOn:
    id: 'transfer-dest-dropdown'
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: 'transfer-dest-wallet-1'
- waitForAnimationToEnd:
    timeout: 1000

# Enter amount: 26000 sats
- tapOn:
    id: 'transfer-amount-input'
- tapOn:
    id: 'transfer-amount-input'
- eraseText:
    charactersToErase: 10
- inputText: '26000'
- pressKey: back
- waitForAnimationToEnd:
    timeout: 3000

# Verify Boltz swap fee info shown
- assertVisible:
    text: '.*Boltz swap.*'

# Tap Transfer to execute
- tapOn:
    id: 'transfer-execute'

# Wait for on-chain tx broadcast + Boltz detection + LN invoice payment
# This can take up to 2 minutes
- extendedWaitUntil:
    visible:
      text: 'Transfer Complete'
    timeout: 120000

# Dismiss alert
- tapOn:
    text: 'OK'
- waitForAnimationToEnd:
    timeout: 3000
