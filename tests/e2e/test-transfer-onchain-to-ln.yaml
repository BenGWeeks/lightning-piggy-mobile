appId: com.lightningpiggy.app
name: Transfer On-chain to LN Test
---
# Tests transferring sats from an on-chain hot wallet to an NWC wallet via Boltz submarine swap.
# Requires: at least 1 hot wallet (mnemonic) with 25,000+ sats + 1 connected NWC wallet.
# Note: Boltz minimum is 25,000 sats.
# Run: maestro test tests/e2e/test-transfer-onchain-to-ln.yaml

# Wait for app to be ready
- extendedWaitUntil:
    visible:
      id: 'tab-home'
    timeout: 40000

# Ensure we're on Home
- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 3000

# Swipe to first wallet and wait for Connected
- repeat:
    times: 10
    commands:
      - swipe:
          start: 15%, 30%
          end: 85%, 30%
          duration: 300
      - waitForAnimationToEnd:
          timeout: 800
- extendedWaitUntil:
    visible:
      text: 'Connected'
    timeout: 30000

# Tap Transfer button
- tapOn:
    id: 'btn-transfer'
- waitForAnimationToEnd:
    timeout: 3000

# Change source to Hot Wallet 1
- tapOn:
    id: 'transfer-source-dropdown'
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      id: 'transfer-source-hot-wallet-1'
    timeout: 5000
- tapOn:
    id: 'transfer-source-hot-wallet-1'
- waitForAnimationToEnd:
    timeout: 1000

# Select destination: NWC wallet (Wallet 1)
- tapOn:
    id: 'transfer-dest-dropdown'
- waitForAnimationToEnd:
    timeout: 2000
- extendedWaitUntil:
    visible:
      id: 'transfer-dest-wallet-1'
    timeout: 5000
- tapOn:
    id: 'transfer-dest-wallet-1'
- waitForAnimationToEnd:
    timeout: 1000

# Enter amount: 26000 sats (above Boltz 25,000 minimum)
- tapOn:
    id: 'transfer-amount-input'
- eraseText:
    charactersToErase: 20
- inputText: '26000'
- pressKey: back
- waitForAnimationToEnd:
    timeout: 3000

# Verify Boltz swap fee info shown
- assertVisible:
    text: '.*Boltz swap.*'

# Tap Transfer to execute
- tapOn:
    id: 'transfer-execute'

# Wait for on-chain tx broadcast + Boltz detection + LN invoice payment
# This can take up to 2 minutes
# On-chain→LN requires on-chain confirmation (~10 min) + Boltz processing
- extendedWaitUntil:
    visible:
      text: 'Transfer Complete'
    timeout: 900000

# Dismiss alert
- tapOn:
    text: 'OK'
- waitForAnimationToEnd:
    timeout: 3000
