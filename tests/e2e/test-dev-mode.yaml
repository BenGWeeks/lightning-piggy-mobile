appId: com.anonymous.lightningpiggyapp
name: Enable Developer Mode Test
---
# Enables developer mode by triple-tapping the version number in Account settings.
# Verifies the "Import Seed Phrase (Beta)" option appears in Add Wallet wizard.
# Run: maestro test tests/e2e/test-dev-mode.yaml

# Wait for app to be ready
- waitForAnimationToEnd:
    timeout: 25000

# Navigate to Account screen via profile icon
- tapOn:
    id: 'profile-icon'
- waitForAnimationToEnd:
    timeout: 3000

# Scroll to the bottom to find the version number
- swipe:
    start: 50%, 80%
    end: 50%, 20%
    duration: 300
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    start: 50%, 80%
    end: 50%, 20%
    duration: 300
- waitForAnimationToEnd:
    timeout: 1000

# Triple-tap the version number to enable dev mode
- tapOn:
    text: 'v.*'
- tapOn:
    text: 'v.*'
- tapOn:
    text: 'v.*'
- waitForAnimationToEnd:
    timeout: 2000

# Verify the developer mode alert appears
- extendedWaitUntil:
    visible:
      text: 'Developer Mode Enabled'
    timeout: 3000

# Dismiss the alert
- tapOn:
    text: 'OK'
- waitForAnimationToEnd:
    timeout: 1000

# Go back to Home
- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 3000

# Open Add Wallet wizard
- repeat:
    times: 6
    commands:
      - swipe:
          start: 85%, 30%
          end: 15%, 30%
          duration: 300
      - waitForAnimationToEnd:
          timeout: 800

- tapOn:
    id: 'add-wallet-card'
- waitForAnimationToEnd:
    timeout: 3000

# Scroll down to see all options
- swipe:
    start: 50%, 80%
    end: 50%, 50%
    duration: 300
- waitForAnimationToEnd:
    timeout: 1000

# Verify "Import Seed Phrase (Beta)" option is visible
- assertVisible:
    text: 'Import Seed Phrase.*'
