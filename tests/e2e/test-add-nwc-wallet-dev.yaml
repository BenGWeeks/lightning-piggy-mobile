appId: com.lightningpiggy.app.dev
name: Add NWC Wallet (hardened for emulator)
---
- extendedWaitUntil:
    visible:
      id: 'tab-home'
    timeout: 40000

- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 3000

# Carousel may already be on Add Wallet card or need swiping. Try direct tap first; if not found, scrollUntilVisible.
- scrollUntilVisible:
    element:
      id: 'add-wallet-card'
    direction: RIGHT
    timeout: 20000
    speed: 40

- tapOn:
    id: 'add-wallet-card'
- extendedWaitUntil:
    visible:
      id: 'wallet-type-nwc'
    timeout: 8000

- tapOn:
    id: 'wallet-type-nwc'
- extendedWaitUntil:
    visible:
      id: 'nwc-url-input'
    timeout: 8000

- tapOn:
    id: 'nwc-url-input'
- tapOn:
    id: 'nwc-url-input'
- eraseText:
    charactersToErase: 500
- inputText: ${MAESTRO_NWC}
- pressKey: back
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    text: 'Next'
# Bump from 5s to 25s — NWC validation + sheet expansion both take time on emulator
- extendedWaitUntil:
    visible:
      id: 'wallet-alias-input'
    timeout: 25000

- tapOn:
    id: 'wallet-alias-input'
- tapOn:
    id: 'wallet-alias-input'
- eraseText:
    charactersToErase: 100
- inputText: ${WALLET_NAME}
- pressKey: back
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    text: 'Next'
- extendedWaitUntil:
    visible:
      id: 'wizard-connect-button'
    timeout: 15000

# Connect button may be off-screen, scroll to ensure it's tappable
- swipe:
    start: 50%, 80%
    end: 50%, 40%
    duration: 300
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: 'wizard-connect-button'
- extendedWaitUntil:
    visible:
      text: 'Connected'
    timeout: 30000

- assertVisible:
    text: ${WALLET_NAME}
