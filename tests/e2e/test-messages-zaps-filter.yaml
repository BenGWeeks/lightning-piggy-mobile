appId: com.lightningpiggy.app.dev
name: Messages Zaps Filter Chip Toggles On and Off
---
# Verifies the "Zaps" filter chip on the Messages inbox (#147). The chip
# defaults to OFF (DMs only) and tapping it unions zap counterparties
# back into the conversation list. This flow asserts the toggle's
# *state* via the hidden `messages-zaps-toggle-{on,off}` marker — the
# visible chip is always present regardless of state, so without the
# marker the test can't distinguish "tap registered" from "tap missed".
# The underlying row-set change requires a known zap-only counterparty
# fixture in the wallet history (out of scope for this flow).
#
# Preconditions:
#   - Logged in (nsec or Amber).
#
# Run: maestro test tests/e2e/test-messages-zaps-filter.yaml

- waitForAnimationToEnd:
    timeout: 10000

# Land on the Messages tab
- tapOn:
    id: 'tab-messages'
- waitForAnimationToEnd:
    timeout: 3000

# Default state: chip visible, marker reads "off".
- assertVisible:
    id: 'messages-zaps-toggle'
- assertVisible:
    id: 'messages-zaps-toggle-off'

# Tap to enable — marker should flip to "on" + the "off" marker should disappear.
- tapOn:
    id: 'messages-zaps-toggle'
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible:
    id: 'messages-zaps-toggle-on'
- assertNotVisible:
    id: 'messages-zaps-toggle-off'

# Tap again to disable — back to "off".
- tapOn:
    id: 'messages-zaps-toggle'
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible:
    id: 'messages-zaps-toggle-off'
- assertNotVisible:
    id: 'messages-zaps-toggle-on'
