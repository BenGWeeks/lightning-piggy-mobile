appId: com.lightningpiggy.app.dev
name: Bottom Sheet Keyboard Slide Test
---
# Verifies that the Connect Nostr bottom sheet slides up when keyboard opens
# so that Login and Use Amber Signer buttons remain visible.
#
# This test ONLY runs when the device is signed out (Connect Nostr sheet is
# only reachable from the sign-in flow). When signed in — the typical CI
# state — the entire flow is a no-op and the test passes. The conversation
# keyboard slide behaviour for signed-in users is covered by
# test-conversation-keyboard.yaml.

- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 10000

# Navigate to Home, open drawer → Profile sub-screen. Both taps are
# optional so the test no-ops cleanly if the user is signed in (no
# profile-icon / drawer rendered the same way).
- tapOn:
    text: 'Home tab'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'profile-icon'
    optional: true
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    id: 'drawer-row-profile'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Only run the keyboard-slide flow if Connect Nostr is reachable
# (i.e. the device is signed out). Skipped otherwise.
- runFlow:
    when:
      visible:
        id: 'connect-nostr'
    commands:
      - tapOn:
          id: 'connect-nostr'
      - waitForAnimationToEnd:
          timeout: 3000
      - assertVisible:
          text: 'Use Amber Signer'
      - tapOn:
          text: 'nsec1...'
      - waitForAnimationToEnd:
          timeout: 3000
      - assertVisible:
          id: 'login-button'
      - pressKey: back
      - waitForAnimationToEnd:
          timeout: 2000
      - pressKey: back
