appId: com.lightningpiggy.app
name: Complete Intro + Onboarding
---
# Drives a fresh install through the IntroScreen + OnboardingScreen so
# subsequent tests (test-login, test-add-nwc-wallet, etc.) can assume the
# user is at the main app with defaults.
#
# Run: maestro test tests/e2e/test-complete-intro.yaml
#
# State required: none (fresh install).

# Give the app a moment to fully launch
- waitForAnimationToEnd:
    timeout: 8000

# IntroScreen: tap "Let's Go" (optional — skipped if already past)
- tapOn:
    text: "Let's Go"
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# OnboardingScreen — fill required fields
- tapOn:
    text: 'Enter your name'
    optional: true
- inputText: 'Ben'
- hideKeyboard

# Tap Get Started
- tapOn:
    text: 'Get Started'
    optional: true
- waitForAnimationToEnd:
    timeout: 5000

# Should now be at Home — verify
- extendedWaitUntil:
    visible:
      id: 'tab-home'
    timeout: 15000
