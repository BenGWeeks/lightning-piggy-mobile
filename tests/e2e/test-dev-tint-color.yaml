appId: com.lightningpiggy.app.dev
name: Dev tint colour swap doesn't crash app
---
# The dev-tint feature swaps `brandPink` + `brandPinkLight` to a blue
# pair when `__DEV__` is true. The colour change itself is a visual
# validation (Maestro can't pixel-inspect), but we can at least smoke
# test that the palette swap doesn't break rendering — the bottom tab
# bar should show up and tabs should be tappable.
#
# Run on the dev variant explicitly (the swap only fires when __DEV__):
#   maestro --device emulator-5554 test tests/e2e/test-dev-tint-color.yaml
#
# Visual check: open the app side-by-side with a production build
# (com.lightningpiggy.app) — the dev variant should show the brand
# colour as blue (#4A90D9) everywhere production shows hot pink
# (#EC008C). App icon is set per-variant via app.config.ts.

- launchApp:
    appId: com.lightningpiggy.app.dev
- waitForAnimationToEnd:
    timeout: 8000

# All four bottom tabs render → palette resolved cleanly through every
# tab-bar style call.
- assertVisible:
    id: 'tab-home'
- assertVisible:
    id: 'tab-messages'
- assertVisible:
    id: 'tab-learn'
- assertVisible:
    id: 'tab-friends'

# Tab switches don't crash → tab styles (active tint = brand-pink) work.
- tapOn:
    id: 'tab-messages'
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'tab-friends'
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 2000
