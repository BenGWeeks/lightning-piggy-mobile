appId: com.lightningpiggy.app.dev
name: Attach tile — Invoice opens ReceiveSheet
---
# Tap the Invoice tile in the inline AttachPanel and verify the
# ReceiveSheet opens (the bolt11 invoice creation flow). Dismiss
# without generating an invoice.
#
# Safety: ReceiveSheet only opens; no `Generate invoice` button is
# tapped, so no real Lightning invoice is created and no DM is sent.
#
# ConversationScreen currently passes `onSendInvoice` unconditionally
# to AttachPanel, so the Invoice tile is always present in the panel
# today. The test still wraps the tile tap in `runFlow when:`
# defensively, so it remains a no-op if a future build makes the tile
# conditional (e.g. on lightningAddress / NWC support) or removes it
# entirely.
#
# Run: maestro --device emulator-5554 test tests/e2e/test-attach-tile-invoice.yaml

- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 15000
- tapOn:
    id: 'tab-messages'
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: 'All'
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- scrollUntilVisible:
    element:
      text: 'Little Piggy.*'
    direction: DOWN
    timeout: 8000
    visibilityPercentage: 60
- tapOn:
    text: 'Little Piggy.*'
- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    id: 'conversation-attach'
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible:
    id: 'conversation-attach-panel'

- runFlow:
    when:
      visible:
        id: 'attach-send-invoice'
    commands:
      - tapOn:
          id: 'attach-send-invoice'
      - waitForAnimationToEnd:
          timeout: 3000
      # ReceiveSheet rendered on top. Wallets without a lud16 land on
      # the AmountEntryScreen directly (see test-receive-landing-by-
      # lud16.yaml for the rationale). Either branch satisfies "the
      # invoice flow opened" so we accept either testID.
      - extendedWaitUntil:
          visible:
            id: 'amount-entry-screen'
          timeout: 5000
      - back
      - waitForAnimationToEnd:
          timeout: 2000
      - assertVisible:
          id: 'conversation-input'
