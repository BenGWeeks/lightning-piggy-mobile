appId: com.lightningpiggy.app.dev
name: Friends tab — filter selection persists across app restart (#311)
---
# Verifies the Friends-tab chip filter (All / Nostr / Contacts) is
# written to AsyncStorage under `friends_filter` and restored on next
# launch. Default is `all` on a brand-new install (no stored value).
#
# testIDs come from FriendsScreen.tsx — `friends-filter-{key}` where
# key is one of 'all', 'nostr', 'contacts'. The hidden marker
# `friends-filter-active-{key}` reflects which filter is currently
# applied; assertVisible against it is the proof of persistence.
#
# Run: maestro --device emulator-5554 test tests/e2e/test-friends-filter-persists.yaml

- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 15000

- tapOn:
    id: 'tab-friends'
- waitForAnimationToEnd:
    timeout: 5000

# Pick a non-default filter so the assertion after restart is meaningful.
- tapOn:
    id: 'friends-filter-nostr'
- waitForAnimationToEnd:
    timeout: 2000

# Sanity check: the active marker reflects the just-tapped chip.
- assertVisible:
    id: 'friends-filter-active-nostr'

# Cold-restart the app. `stopApp` first ensures JS is reloaded
# (without it, `launchApp` against an already-running app may not
# re-run mount effects, so the test could pass even if persistence
# is broken). `clearState:false` preserves AsyncStorage so the
# persisted filter value survives.
- stopApp
- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 15000

- tapOn:
    id: 'tab-friends'
- waitForAnimationToEnd:
    timeout: 5000

# Real assertion: the active marker reflects `nostr` — proves the
# persisted value was read on mount and applied. assertNotVisible on
# the `all` marker rules out the "default fallback" false positive.
- assertVisible:
    id: 'friends-filter-active-nostr'
- assertNotVisible:
    id: 'friends-filter-active-all'

# Restore the default so subsequent test runs start from `all`.
- tapOn:
    id: 'friends-filter-all'
