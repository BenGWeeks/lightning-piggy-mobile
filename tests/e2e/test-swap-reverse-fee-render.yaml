appId: com.lightningpiggy.app.dev
name: Boltz reverse swap — fee summary renders for Lightning → on-chain
---
# Scaffold for issue #453. Cheapest of the Boltz E2E suite — does NOT
# create a real swap. Asserts the parse → getSwapFees → summary text
# pipeline works end-to-end:
#
#   1. Open SendSheet via tab-home → btn-send
#   2. Switch to the Input tab + paste a BIP-21 with embedded amount
#   3. Tap Go → SendSheet decodes the address, hits Boltz's
#      getReverseSwapFees, renders "Swap fee: ~N sats · ~10-60 min"
#   4. Stop here — never tap Send. No on-chain HTLC, no Lightning
#      payment, no funds moved.
#
# Preconditions:
#   - AVD logged in as the swap-test designate (Big Piggy in this
#     repo, since the issue calls out funding extra sats both sides).
#   - Active wallet is Lightning (NWC) — onchain → Lightning would
#     route a submarine swap, not a reverse one. Switch wallets via
#     the carousel if the wrong one is at the front.
#   - Device clipboard pre-seeded with a BIP-21 string + amount, e.g.:
#
#       source .env
#       AMOUNT_BTC=0.0001   # 10000 sats — comfortably above BOLTZ_MIN
#       echo -n "bitcoin:${MAESTRO_ADDR_BIG}?amount=${AMOUNT_BTC}" \
#         | xclip -selection clipboard
#       maestro test tests/e2e/test-swap-reverse-fee-render.yaml
#
# Boltz min is 25,000 sats (boltzService.BOLTZ_MIN_SATS); the BIP-21
# above sits below that on purpose — server returns the real range
# but min/max gating happens on the amount step, not on first parse,
# so the fee summary still renders. If we want a "fee + amount green"
# variant, paste 50000 sats (0.0005 BTC) instead.
#
# Why scaffold rather than full happy-path:
#   - This guard catches any regression in `boltzService.getSwapFees`
#     wiring, BIP-21 parse breakage, or the render text in
#     `SendSheet.tsx:987` ("Swap fee: ~N sats…")
#   - Costs nothing per run → safe for every PR's CI matrix
#   - Real-swap test (`test-swap-reverse-25k.yaml`) is a separate
#     follow-up: it costs ~26k sats per run + miner fees + Boltz fee
#     and needs swap-back orchestration so Big Piggy doesn't drain.

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: 'tab-home'
    timeout: 30000

- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 2000

- tapOn:
    id: 'btn-send'
- waitForAnimationToEnd:
    timeout: 3000

# Switch to manual-input tab — default is Scan (camera).
- tapOn:
    id: 'send-tab-input'
- waitForAnimationToEnd:
    timeout: 1500

# Paste from clipboard via the in-app button (avoids the
# BottomSheetTextInput inputText char-drop pattern under New
# Architecture).
- tapOn:
    id: 'send-paste-clipboard'
- waitForAnimationToEnd:
    timeout: 1500

# Submit pasted text → SendSheet parses the BIP-21 and triggers the
# Boltz fee fetch. Wait for the "Swap fee:" copy itself rather than
# a fixed-duration sleep so the test rides Boltz's real RTT instead
# of guessing — slow networks no longer flake here. Copy comes from
# SendSheet.tsx ~line 987; substring-match because the actual sat
# number depends on Boltz's server-quoted percentage + lockup.
- tapOn:
    id: 'send-paste-go'
- extendedWaitUntil:
    visible:
      text: '.*Swap fee:.*sats.*'
    timeout: 12000
