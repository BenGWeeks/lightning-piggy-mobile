appId: com.lightningpiggy.app.dev
name: Send Lightning Address to Friend (dev)
---
# Opens the Receive sheet in Address mode (no wallet needed — just a
# lightning address on the Account profile), then taps the Friend button
# and verifies the FriendPickerSheet presents. Narrower than the full
# invoice flow, but it isolates the original Maestro-onPress hypothesis
# (issue #106) — did removing the TouchableWithoutFeedback wrapper let
# UiAutomator clicks reach the nested testID?

- waitForAnimationToEnd: { timeout: 10000 }

- tapOn: { id: 'tab-home' }
- waitForAnimationToEnd: { timeout: 3000 }

- tapOn: { id: 'btn-receive' }
- extendedWaitUntil:
    visible: { id: 'receive-tab-address' }
    timeout: 10000

# Stay on Address tab (default) — friendShareValue = lightningAddress
- extendedWaitUntil:
    visible: { text: 'test@getalby.com' }
    timeout: 5000

# Tap Friend
- tapOn: { id: 'receive-send-to-friend' }
- waitForAnimationToEnd: { timeout: 2000 }

# Assert the FriendPicker opened — confirms onPress fired
- extendedWaitUntil:
    visible: { text: 'Send invoice to a friend' }
    timeout: 10000
