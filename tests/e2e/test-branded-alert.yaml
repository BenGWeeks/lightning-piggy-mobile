appId: com.lightningpiggy.app.dev
name: BrandedAlert renders for invalid Send-sheet input
---
# Triggers a `BrandedAlert.alert(...)` via the Send sheet's invalid-
# invoice path, then asserts the on-brand modal renders (rather than
# the system Alert.alert dialog) by looking for the `branded-alert`
# testID and one of its `branded-alert-button-N` ids.
#
# The send-sheet's pasted-invalid-input is the most reliably-triggerable
# alert in the app today — most other alerts are gated on real device
# state (e.g. NFC-not-enabled, camera-permission-denied) which an
# emulator can't easily fake.
#
# Pre-reqs:
#  - .env contains MAESTRO_NSEC
#  - Signed-in account has at least one connected NWC wallet
#
# Run:
#   source .env && maestro --device emulator-5554 test \
#     -e MAESTRO_NSEC=$MAESTRO_NSEC \
#     tests/e2e/test-branded-alert.yaml

- runFlow: _subflow-login-as.yaml

- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 3000

# Open the SendSheet (Home → Send button)
- tapOn:
    id: 'home-send-button'
- waitForAnimationToEnd:
    timeout: 3000

# Switch to the Input tab + enter obviously-invalid text → triggers
# `BrandedAlert.alert('Invalid invoice', ...)` after the Go tap.
# Uses stable testIDs (send-tab-input / send-paste-input / send-paste-go)
# so the test doesn't break if the visible label is reworded.
- tapOn:
    id: 'send-tab-input'
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: 'send-paste-input'
- inputText: 'definitely-not-a-valid-bolt11'
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: 'send-paste-go'
- waitForAnimationToEnd:
    timeout: 2500

# The branded-alert modal should now render. Verify by testID — these
# are the testIDs added by BrandedAlertHost. If the system Alert.alert
# fired instead, this assertion fails (system alert has no testID).
- assertVisible:
    id: 'branded-alert'
- assertVisible:
    id: 'branded-alert-title'

# Tap the OK / dismiss button (testID `branded-alert-button-0` for the
# single-button form) and verify the alert closes.
- tapOn:
    id: 'branded-alert-button-0'
- waitForAnimationToEnd:
    timeout: 1500
- assertNotVisible:
    id: 'branded-alert'
