appId: com.lightningpiggy.app.dev
name: Hunt Create — toggle Public publishes to relays after save
---
# Smoke flow for the M6.2 publish path. Walks the hider through:
# paste live LNURL → validate → fill memo → drop pin → toggle Public →
# save. The publish step requires a Nostr signer (nsec or Amber); on
# emulators without one, the toast tells the user "Could not sign
# Piggy listing — saved locally". We accept both outcomes (relay
# publish OR signer-declined toast); both prove the create flow ran
# end-to-end. The deterministic-relay assertion (event lands +
# Discover sees it) lives in the M8 fixture-relay flow.
#
# Run: maestro test tests/e2e/test-hunt-publish-public.yaml

- launchApp:
    permissions:
      location: allow

- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    id: 'tab-explore'
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: 'explore-card-hunt'
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: 'hunt-create-piggy-button'
- waitForAnimationToEnd:
    timeout: 1500

# Paste the live Geo-Cache 1 LNURL — small / fixed claim cap so
# accidental claims during testing are bounded.
- tapOn:
    id: 'hunt-piggy-lnurl-input'
- inputText: 'lnurlw://bank.weeksfamily.me/withdraw/api/v1/lnurl/B2qnmj9HAyA2TnEwbvx2nX/GqSmSakRohyenUpBN8QYhy'
- tapOn:
    id: 'hunt-piggy-validate-button'
- extendedWaitUntil:
    visible: 'Looks good'
    timeout: 8000

# Memo + GPS pin + Public toggle.
- tapOn:
    id: 'hunt-piggy-memo-input'
- inputText: 'Geo-Cache 1 — Maestro publish smoke'
- tapOn:
    id: 'hunt-piggy-pin-here-button'
- waitForAnimationToEnd:
    timeout: 4000
- tapOn:
    id: 'hunt-piggy-public-toggle'

# Save → publish.
- tapOn:
    id: 'hunt-piggy-save-button'
- waitForAnimationToEnd:
    timeout: 6000

# Either the success toast OR the signer-declined toast. Both prove
# the codepath ran without crashing.
- runFlow:
    when:
      visible: 'Piggy published'
    commands:
      - assertVisible: 'Visible on Discover'
- runFlow:
    when:
      notVisible: 'Piggy published'
    commands:
      - assertVisible: 'Piggy hidden'

# Bail out — we're in the saved state, NFC write is exercised by
# test-hunt-write-nfc which doesn't need the publish path.
- tapOn:
    id: 'hunt-piggy-done-button'
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    id: 'hunt-screen'
