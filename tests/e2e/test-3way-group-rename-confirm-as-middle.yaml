appId: com.lightningpiggy.app.dev
name: 3-way group chat — Middle Piggy sees rename
---
# Phase 5. Logs in as Middle Piggy and verifies the rename has propagated
# via the kind-30200 inbound subscription.

- runFlow:
    file: _subflow-login-as.yaml
    env:
      MAESTRO_NSEC: ${MAESTRO_NSEC3}

- tapOn:
    id: 'tab-friends'
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'groups-button'
- waitForAnimationToEnd:
    timeout: 3000

- extendedWaitUntil:
    visible:
      text: 'Triad-renamed'
    timeout: 30000

- runFlow: test-logout.yaml
