appId: com.lightningpiggy.app.dev
name: Attach tile — Voice opens VoiceRecordingSheet
---
# Tap the Voice tile in the inline AttachPanel and verify that the
# voice-recording sheet (#235) opens. Then cancel back to the conversation
# without granting microphone permission — the OS permission prompt only
# fires when the user taps the mic *inside* the sheet, so just opening
# the sheet is safe to run on every CI build.
#
# Safety: no microphone access, no DM sent, no payment flow.
#
# Run: maestro --device emulator-5554 test tests/e2e/test-attach-tile-voice.yaml

- launchApp:
    clearState: false
- waitForAnimationToEnd:
    timeout: 15000
- tapOn:
    id: 'tab-messages'
- waitForAnimationToEnd:
    timeout: 5000
- tapOn:
    text: 'All'
    optional: true
- waitForAnimationToEnd:
    timeout: 1000
- scrollUntilVisible:
    element:
      text: 'Little Piggy.*'
    direction: DOWN
    timeout: 8000
    visibilityPercentage: 60
- tapOn:
    text: 'Little Piggy.*'
- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    id: 'conversation-attach'
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible:
    id: 'conversation-attach-panel'
- assertVisible:
    id: 'attach-tile-voice'

- tapOn:
    id: 'attach-tile-voice'
- waitForAnimationToEnd:
    timeout: 3000
- assertVisible:
    id: 'voice-recording-sheet'
- assertVisible:
    id: 'voice-record-toggle'
- assertVisible:
    id: 'voice-cancel-button'
- assertVisible:
    id: 'voice-send-button'

# Cancel returns us to the conversation; the attach panel itself stays
# behind so the user can pick a different tile if they changed their mind.
- tapOn:
    id: 'voice-cancel-button'
- waitForAnimationToEnd:
    timeout: 2000
- assertNotVisible:
    id: 'voice-recording-sheet'
- assertVisible:
    id: 'conversation-input'
