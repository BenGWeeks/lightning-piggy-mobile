appId: com.anonymous.lightningpiggyapp
name: Transfer Between Wallets Test
---
# Tests transferring 5 sats between two NWC wallets (Lightning to Lightning).
# Requires at least 2 connected NWC wallets (Wallet 1 and Wallet 2).
# Run: maestro test tests/e2e/test-transfer.yaml

# Wait for app to be ready and wallets to connect
- waitForAnimationToEnd:
    timeout: 20000

# Swipe to Wallet 1 (first wallet in carousel)
- swipe:
    start: 15%, 30%
    end: 85%, 30%
    duration: 300
- waitForAnimationToEnd:
    timeout: 1000
- swipe:
    start: 15%, 30%
    end: 85%, 30%
    duration: 300
- waitForAnimationToEnd:
    timeout: 1000

# Tap the Transfer button
- tapOn:
    id: 'btn-transfer'
- waitForAnimationToEnd:
    timeout: 3000

# Select destination wallet — open dropdown and pick Wallet 2
- tapOn:
    id: 'transfer-dest-dropdown'
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    text: 'Wallet 2.*'
- waitForAnimationToEnd:
    timeout: 1000

# Enter amount: 5 sats
- tapOn:
    id: 'transfer-amount-input'
- eraseText:
    charactersToErase: 10
- inputText: '5'
- pressKey: back
- waitForAnimationToEnd:
    timeout: 2000

# Verify Lightning routing fee (not Boltz swap fee)
- assertVisible:
    text: '.*Lightning.*'

# Tap Transfer execute button (not the title)
- tapOn:
    id: 'transfer-execute'
- waitForAnimationToEnd:
    timeout: 20000

# Verify success alert
- extendedWaitUntil:
    visible:
      text: 'Transfer Complete'
    timeout: 30000

# Dismiss the alert
- tapOn:
    text: 'OK'
- waitForAnimationToEnd:
    timeout: 3000
