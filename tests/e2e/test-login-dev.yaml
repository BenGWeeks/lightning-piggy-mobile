appId: com.lightningpiggy.app.dev
name: Nostr Login Test (dev variant)
---
# Login flow targeting the dev APK (com.lightningpiggy.app.dev).
# Equivalent to test-login.yaml but with the appId hardcoded for the dev
# variant; test-login.yaml's ${APP_ID:-com.lightningpiggy.app} default
# syntax trips Maestro's GraalJs evaluator.
#
# Run: source .env && maestro test -e MAESTRO_NSEC="$MAESTRO_NSEC" tests/e2e/test-login-dev.yaml

- waitForAnimationToEnd:
    timeout: 10000

# Navigate to Account via profile icon on Home
- tapOn:
    id: 'tab-home'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'profile-icon'
- waitForAnimationToEnd:
    timeout: 5000

# Log out first if a previous session is still active
- tapOn:
    id: 'logout-button'
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    text: 'Logout'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'profile-icon'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Connect Nostr
- tapOn:
    id: 'connect-nostr'
- waitForAnimationToEnd:
    timeout: 5000

- tapOn:
    id: 'nsec-input'
- inputText: ${MAESTRO_NSEC}
- hideKeyboard
- waitForAnimationToEnd:
    timeout: 2000

- tapOn:
    id: 'login-button'
- waitForAnimationToEnd:
    timeout: 10000

# "Update from Nostr Profile?" dialog — accept so tests use the
# published profile (name/picture) instead of the local onboarding name.
- tapOn:
    text: 'UPDATE'
    optional: true
- waitForAnimationToEnd:
    timeout: 3000

# Sheet dismisses on success; we should be back on Account
- extendedWaitUntil:
    visible:
      text: 'Ben'
    timeout: 15000

# Android contacts-access system dialog appears first time Friends tab is
# opened after login. Accept it so Friends tab can import device contacts.
- tapOn:
    text: 'Allow'
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
