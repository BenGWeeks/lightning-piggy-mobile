appId: ${APP_ID:-com.anonymous.lightningpiggyapp}
name: Follow and Unfollow Test
---
# Tests following npubs via the Add Friend sheet
# Assumes already logged in with a Nostr account
# Run: maestro test tests/e2e/test-follow-unfollow.yaml

# Wait for app to be ready
- waitForAnimationToEnd:
    timeout: 15000

# Navigate to Friends tab
- tapOn:
    text: 'Friends tab'
- waitForAnimationToEnd:
    timeout: 5000

# --- Follow first npub ---
- tapOn:
    id: 'add-friend-button'
- extendedWaitUntil:
    visible:
      id: 'npub-input'
    timeout: 5000
- tapOn:
    id: 'npub-input'
- inputText: 'npub1m2s0px84gd8a6wypttjrmd8shtfak0drvy02vl3q3h0gfq2m98ws2gjtul'
- pressKey: back
- waitForAnimationToEnd:
    timeout: 1000
- tapOn:
    id: 'add-friend-submit'
- waitForAnimationToEnd:
    timeout: 15000

