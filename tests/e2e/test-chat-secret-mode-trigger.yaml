appId: ${APP_ID || 'com.lightningpiggy.app.dev'}
name: Chat secret-mode trigger — Big Piggy sends, Little Piggy toggles
---
# Walks the end-to-end flow added in #590:
#   1. Big Piggy logs in, opens DMs with Little Piggy, sends the magic
#      word "secretthreewords" as a plain message.
#   2. Little Piggy logs in, opens DMs with Big Piggy, sees the
#      Secret Mode card render where the bare word would have been.
#   3. Little Piggy taps "Toggle Secret Mode". The SecretModeCelebration
#      overlay (confetti + reveal card) shows on top of the conversation.
#
# Env required (matches the rest of the suite):
#   MAESTRO_NSEC_BIG          — Big Piggy's nsec
#   MAESTRO_NSEC_LITTLE       — Little Piggy's nsec
#   MAESTRO_NPUB_LITTLE       — Little Piggy's npub (for Big to DM)
#   MAESTRO_NPUB_BIG          — Big Piggy's npub (for Little to find the thread)
#
# Run:
#   maestro test tests/e2e/test-chat-secret-mode-trigger.yaml

# ─── Big Piggy: send the trigger ───────────────────────────────────────────
- runFlow:
    file: _subflow-login-as-piggy.yaml
    env:
      PIGGY_NSEC: ${MAESTRO_NSEC_BIG}

- tapOn: { id: 'tab-messages' }
- waitForAnimationToEnd: { timeout: 3000 }

# Compose a fresh DM to Little Piggy via their npub. Reusing the
# existing new-conversation flow rather than picking from contacts —
# the test fixture may not have Little Piggy as a follow.
- tapOn: { id: 'messages-fab-new' }
- waitForAnimationToEnd: { timeout: 2000 }

- tapOn: { id: 'new-conversation-npub-input' }
- inputText: ${MAESTRO_NPUB_LITTLE}
- tapOn: { text: 'Start conversation' }
- waitForAnimationToEnd: { timeout: 3000 }

- tapOn: { id: 'composer-input' }
- inputText: 'secretthreewords'
- tapOn: { id: 'composer-send' }
- waitForAnimationToEnd: { timeout: 3000 }

# Sender-side card should render (we render on both sides per the
# component's design — sender sees a confirmation that it landed).
- assertVisible: 'Secret Mode'

# ─── Little Piggy: receive + toggle ────────────────────────────────────────
- runFlow:
    file: _subflow-login-as-piggy.yaml
    env:
      PIGGY_NSEC: ${MAESTRO_NSEC_LITTLE}

- tapOn: { id: 'tab-messages' }
- waitForAnimationToEnd: { timeout: 3000 }

# Wait for the inbox to backfill — NIP-17 wraps may take a few seconds
# to arrive over the relay.
- extendedWaitUntil:
    visible: 'Big Piggy'
    timeout: 30000
- tapOn: 'Big Piggy'
- waitForAnimationToEnd: { timeout: 3000 }

# The magic message renders as a Secret Mode card, NOT as plain text.
- assertVisible: 'Secret Mode'
- assertVisible: 'Toggle Secret Mode'
- assertNotVisible: 'secretthreewords'

# Tap the toggle. The SecretModeCelebration overlay (confetti +
# `Secret Mode Enabled` card) should appear on top of the conversation.
- tapOn: 'Toggle Secret Mode'
- waitForAnimationToEnd: { timeout: 2000 }

# Match the celebration overlay's headline copy — this string ("Secret
# Mode Enabled" / "Secret Mode Disabled") lives in
# SecretModeCelebration.tsx and is distinct from the in-chat card's
# "Secret Mode" label, so this assertion specifically proves the
# overlay fired and not just the bubble re-rendered.
- extendedWaitUntil:
    visible: 'Secret Mode Enabled'
    timeout: 5000

# Dismiss the celebration (OK button on the reveal card) so the
# next test step / cleanup isn't gated on the overlay.
- tapOn: 'OK'
- waitForAnimationToEnd: { timeout: 1500 }
