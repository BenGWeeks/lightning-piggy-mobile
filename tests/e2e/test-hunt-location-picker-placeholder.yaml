appId: com.lightningpiggy.app.dev
name: Location picker — placeholder before pick, coord + commit after pick
---
# Regression test for #72 follow-ups: the Hide-a-Piglet wizard's
# location picker used to render the UK fallback coords (54.00000,
# -2.00000) the moment it opened, even though the user hadn't placed a
# pin. That made a default look like a real choice. Fix shows a
# placeholder instead and disables the "Use this location" button until
# the user drags/taps the marker; then on confirm the pin commits back
# to the wizard.
#
# Covers:
#   1. Initial state — placeholder copy visible, no coord testID,
#      confirm button rendered (disabled visually).
#   2. After-tap — tapping the map area surfaces the coord testID.
#   3. End-to-end — tapping "Use this location" closes the sheet and
#      the wizard now shows the "Adjust on map" path (proves a pin
#      reached the parent screen).
#
# Coordinate exception: step 2 taps the Leaflet WebView at a fractional
# point. CLAUDE.md normally forbids `point:` taps, but the map area is
# a single WebView with no React Native nodes to target — there is no
# testID to anchor on. With the user's explicit OK this one coordinate
# is fine; everything else uses ids.
#
# Pre-reqs:
#  - Emulator already has a signed-in session (any Piggy account).
#    We deliberately don't go via _subflow-login-as.yaml because that
#    subflow currently references a stale `drawer-row-profile` testID
#    and fails before the picker even opens. Filed as a follow-up.
#
# Run:
#   maestro --device emulator-5554 test \
#     tests/e2e/test-hunt-location-picker-placeholder.yaml

- tapOn:
    id: 'tab-explore'
- tapOn:
    id: 'explore-card-hunt'
- tapOn:
    id: 'hunt-my-piglets-button'
- tapOn:
    id: 'my-piglets-hide-cta'

# Step 1 (Hardware) → step 2 (Prize) → step 3 (Location).
- tapOn:
    id: 'hunt-piggy-step-next'
- tapOn:
    id: 'hunt-piggy-step-next'

- tapOn:
    id: 'hunt-piggy-pick-on-map-button'
- waitForAnimationToEnd:
    timeout: 3000

# 1. Initial state — placeholder copy + no coord readout.
- assertVisible: 'Where did you hide it?'
- assertVisible: 'Tap or drag the pin to mark a location'
- assertNotVisible:
    id: 'location-picker-coord'
- assertVisible:
    id: 'location-picker-confirm'

# 2. Tap the map area. The WebView spans most of the sheet — 50%/45%
# lands well inside it.
- tapOn:
    point: 50%, 45%
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible:
    id: 'location-picker-coord'
- assertNotVisible: 'Tap or drag the pin to mark a location'

# 3. Confirm — sheet closes, wizard now shows the "Adjust on map"
# button (proves a pin reached the wizard's `pin` state).
- tapOn:
    id: 'location-picker-confirm'
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible:
    id: 'hunt-piggy-adjust-pin-button'
- assertNotVisible:
    id: 'hunt-piggy-pick-on-map-button'
