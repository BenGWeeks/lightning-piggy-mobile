appId: com.lightningpiggy.app.dev
name: Hunt finder celebration screen renders + claim button is reachable
---
# Verifies HuntFoundScreen mounts when the user navigates manually
# (the deep-link path from App.tsx's Linking listener requires a real
# `lightning:` URI tap, which Maestro can't synthesise without
# `openLink`). Asserts the celebration card, claim button, and the
# "sleeping" / "couldn't claim" graceful fallbacks.
#
# This flow needs an LNURL-withdraw URL to drive the deep-link
# handler — it MUST come from `$MAESTRO_TEST_LNURL_W` in the
# environment, NOT hardcoded in this file. Committing real bearer
# tokens to the repo is equivalent to publishing a secret (anyone
# could drain the cache until server-side caps trip). Run locally:
#
#   export MAESTRO_TEST_LNURL_W='lnurlw://your-dev-lnbits/.../...'
#   maestro test .maestro/hunt/flow-038-hunt-found-screen.yaml \
#     -e LNURL_W=$MAESTRO_TEST_LNURL_W
#
# Assertions are structural so the test passes regardless of the
# live endpoint's cooldown / budget state.

- launchApp:
    permissions:
      location: allow

- waitForAnimationToEnd:
    timeout: 10000

# Open Lightning Piggy via the lightning: scheme. Maestro's openLink
# routes through the OS, so this exercises the same code path a real
# NFC tap goes through. ${LNURL_W} is provided via Maestro's `-e`
# flag from a local env var so no bearer token lands in git.
- openLink: 'lightning:${LNURL_W}'
- waitForAnimationToEnd:
    timeout: 6000

- assertVisible:
    id: 'hunt-found-screen'

# One of three states must render — either the celebration with the
# claim button, the "sleeping" fallback, or the generic "couldn't
# claim" branch. We accept all three because the live endpoint's
# state (in cooldown, budget exhausted, network dropped) is
# unpredictable from CI.
- runFlow:
    when:
      visible:
        id: 'piggy-claim-button'
    commands:
      - assertVisible: 'You found a Piggy!'
- runFlow:
    when:
      notVisible:
        id: 'piggy-claim-button'
    commands:
      - assertVisible:
          text: 'Hunt'
