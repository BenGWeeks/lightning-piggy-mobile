appId: ${APP_ID || 'com.lightningpiggy.app.dev'}
name: Hunt Create — Save STL surfaces the Save / Share branded alert
---
# Smoke flow for the Save-STL action on step 1 of Hide-a-Piglet (#75).
# On Android the button opens a 3-option BrandedAlert: Save to Files /
# Share… / Cancel. The Save to Files path goes through SAF
# (`requestDirectoryPermissionsAsync`) which we can't drive headlessly
# in Maestro — the system picker is owned by Android's DocumentsUI
# package, not our app — so we only assert the alert surfaces with the
# right buttons, then dismiss via Cancel. iOS skips the alert and goes
# straight to the system share sheet (UTI = STL), so this flow is
# Android-only by intent.
#
# Run: maestro test .maestro/hunt/flow-041-hunt-save-stl.yaml

- launchApp:
    permissions:
      location: allow

- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    id: 'tab-explore'
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: 'explore-card-hunt'
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: 'hunt-my-piglets-button'
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: 'my-piglets-hide-cta'
- waitForAnimationToEnd:
    timeout: 2000

# Step 1's "Get the hardware" card is the default landing. Tap Save STL
# — the BrandedAlert pops up with three actions.
- assertVisible:
    id: 'get-a-piggy-print-button'
- tapOn:
    id: 'get-a-piggy-print-button'
- waitForAnimationToEnd:
    timeout: 1500

# BrandedAlert renders buttons indexed left-to-right via `branded-alert-
# button-N`. Order = [Save to Files, Share…, Cancel] on Android. We
# assert the alert is open and dismiss via Cancel — exercising the
# SAF picker would need a separate Android-instrumented test (#75
# follow-up if we ever need it).
- assertVisible: 'Save Piggy Bag Charm STL'
- assertVisible: 'Save to Files'
- assertVisible: 'Share…'
- assertVisible: 'Cancel'
- tapOn: 'Cancel'
- waitForAnimationToEnd:
    timeout: 800
- assertNotVisible: 'Save Piggy Bag Charm STL'
