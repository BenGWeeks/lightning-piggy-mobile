appId: com.lightningpiggy.app.dev
name: Keyboard audit — FriendPickerSheet search
---
- launchApp:
    appId: com.lightningpiggy.app.dev
    stopApp: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    id: 'tab-messages'
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'start-conversation-button'
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'friend-picker-search'
- waitForAnimationToEnd:
    timeout: 2000
