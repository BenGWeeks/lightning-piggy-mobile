appId: com.lightningpiggy.app.dev
name: Keyboard audit — AddFriendSheet npub input
---
- launchApp:
    appId: com.lightningpiggy.app.dev
    stopApp: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    id: 'tab-friends'
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'add-friend-button'
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'npub-input'
- waitForAnimationToEnd:
    timeout: 2000
