appId: com.lightningpiggy.app.dev
name: Keyboard audit — FeedbackSheet input (via Account → About)
---
- launchApp:
    appId: com.lightningpiggy.app.dev
    stopApp: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    id: 'profile-icon'
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'drawer-row-about'
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'feedback-button'
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'feedback-input'
- waitForAnimationToEnd:
    timeout: 2000
