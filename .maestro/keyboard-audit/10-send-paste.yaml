appId: com.lightningpiggy.app.dev
name: Keyboard audit — SendSheet paste input
---
- launchApp:
    appId: com.lightningpiggy.app.dev
    stopApp: true
- waitForAnimationToEnd:
    timeout: 8000
- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 3000
- tapOn:
    id: 'btn-send'
- waitForAnimationToEnd:
    timeout: 2000
- tapOn:
    id: 'send-tab-input'
- waitForAnimationToEnd:
    timeout: 1500
- tapOn:
    id: 'send-paste-input'
- waitForAnimationToEnd:
    timeout: 2000
