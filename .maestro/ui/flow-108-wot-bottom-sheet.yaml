appId: com.lightningpiggy.app.dev
name: WoT bottom sheet — open from Hunt filter, verify tier states (#535 / #536)
---
# Flow: Explore → Hunt rail → See all → filter button → WoT chip → sheet.
#
# Verifies:
#   - The bottom sheet opens via the WoT chip in the Hunt filter sheet
#   - "Friends" tier is the active / selected tier on first open
#   - "Friends+" (fof) and "All" tiers are visible AND disabled (secret
#     mode is off in the default Maestro account profile)
#   - The gate-hint copy ("Enable Secret mode on About …") is visible,
#     which is the user-facing signal that those rows are disabled.
#   - Closing and re-opening the sheet restores the same state — i.e.
#     no spurious tier change happened on disabled-row taps.
#
# Disabled-row interaction: Maestro's `tapOn` on a `disabled` TouchableOpacity
# is a no-op (RN swallows the press). We tap each disabled tier and then
# assert the gate-hint is still visible + the active tier is still
# `wot-tier-friends-chip` — together those prove the disabled state held.

- launchApp:
    permissions:
      location: allow

- waitForAnimationToEnd:
    timeout: 10000

# Land on Explore. The Hunt rail is "Geo-caches near you" with
# seeAllTestId="explore-card-hunt" — tapping it opens HuntScreen.
- tapOn:
    id: 'tab-explore'
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: 'explore-card-hunt'
- waitForAnimationToEnd:
    timeout: 4000

# Open the Hunt filter sheet (filter button next to search).
- tapOn:
    id: 'hunt-filter-button'
- waitForAnimationToEnd:
    timeout: 1000

# Open the WoT bottom sheet by tapping the WoT chip inside the filter sheet.
- tapOn:
    id: 'hunt-filter-wot-chip'
- waitForAnimationToEnd:
    timeout: 1000

# Sheet is open.
- assertVisible:
    id: 'wot-bottom-sheet'

# Friends row is the active tier on a fresh install (default tier).
- assertVisible:
    id: 'wot-tier-friends-chip'

# Wider tiers are visible but disabled (secret-mode gated).
# Disabled rows render with reduced opacity but remain in the tree, so
# `assertVisible` is the right matcher.
- assertVisible:
    id: 'wot-tier-fof-chip'
- assertVisible:
    id: 'wot-tier-all-chip'

# Gate hint copy is the user-visible "this is locked" signal. Its
# presence on first sheet open implies secretMode === false.
- assertVisible:
    id: 'wot-sheet-gate-hint'

# Tap the disabled "Friends+" tier — should NOT switch the active tier.
- tapOn:
    id: 'wot-tier-fof-chip'
- waitForAnimationToEnd:
    timeout: 500

# Tap the disabled "All" tier — same expectation.
- tapOn:
    id: 'wot-tier-all-chip'
- waitForAnimationToEnd:
    timeout: 500

# Gate hint must still be visible — proves no secret-mode toggle slipped in.
- assertVisible:
    id: 'wot-sheet-gate-hint'

# Close the sheet via the Done button.
- tapOn:
    id: 'wot-sheet-done'
- waitForAnimationToEnd:
    timeout: 1000

# Bottom sheet should no longer be visible.
- assertNotVisible:
    id: 'wot-bottom-sheet'

# Re-open via the chip → state should be the same (Friends still active,
# Friends+ / All still disabled). If a stray disabled-row tap had
# leaked through, the active tier would have flipped here.
- tapOn:
    id: 'hunt-filter-wot-chip'
- waitForAnimationToEnd:
    timeout: 1000

- assertVisible:
    id: 'wot-bottom-sheet'
- assertVisible:
    id: 'wot-tier-friends-chip'
- assertVisible:
    id: 'wot-sheet-gate-hint'

# Close + dismiss the Hunt filter sheet so we leave the app on the
# HuntScreen (not on a stacked-modal screen) for any chained flows.
- tapOn:
    id: 'wot-sheet-done'
- waitForAnimationToEnd:
    timeout: 500
- tapOn:
    id: 'hunt-filter-done'
- waitForAnimationToEnd:
    timeout: 1000
