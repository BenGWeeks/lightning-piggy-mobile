appId: ${APP_ID || 'com.lightningpiggy.app.dev'}
name: Explore tab renders the hub with Places / Geo-caches / Events / Lessons rails
---
# Verifies the rename of the Learn tab to Explore: the bottom-tab button
# answers to `tab-explore`, taps land on the new ExploreHome hub, and the
# four content rails (Places, Geo-caches, Events, Lessons) are reachable.
# The legacy `explore-card-{key}` testIDs are preserved on each rail's
# "See all →" button (see ExploreHomeScreen.tsx seeAllTestId props) so
# this flow still uses them as scroll/tap targets — but the surrounding
# layout is rails, not the original four-card grid the comment used to
# describe. Lessons drills into the existing course catalog (regression
# check); Map / Hunt / Events open their sub-screens.
#
# Run: maestro test .maestro/ui/flow-103-explore-tab-rename.yaml

- waitForAnimationToEnd:
    timeout: 10000

# Tap the renamed tab. The old `tab-learn` testID is gone.
- tapOn:
    id: 'tab-explore'
- waitForAnimationToEnd:
    timeout: 2000

# Hub header + four discovery rails. The hub is scrollable
# (mini-map preview + content rails below); assert each rail in
# top-to-bottom order so `scrollUntilVisible` only ever needs to
# scroll DOWN (it won't backtrack upward by default).
- assertVisible: 'Explore'
- scrollUntilVisible:
    element:
      id: 'explore-card-map'
- scrollUntilVisible:
    element:
      id: 'explore-card-hunt'
- scrollUntilVisible:
    element:
      id: 'explore-card-events'
- scrollUntilVisible:
    element:
      id: 'explore-card-lessons'

# Scroll back up so the rest of the flow starts from the top.
- scrollUntilVisible:
    element:
      id: 'explore-minimap'
    direction: UP

# Drill into Lessons — existing courses must still render.
- tapOn:
    id: 'explore-card-lessons'
- waitForAnimationToEnd:
    timeout: 2000
- assertVisible: 'Lessons'
- assertVisible: 'Satoshi Nakamoto'

# Back to hub.
- back
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible:
    id: 'explore-card-map'

# Map stub.
- tapOn:
    id: 'explore-card-map'
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    id: 'map-screen'
- assertVisible: 'Bitcoin merchants near you'
- tapOn:
    id: 'map-back-button'
- waitForAnimationToEnd:
    timeout: 1000

# Geo-caches (merged Hunt + Discover screen, PR #488).
- tapOn:
    id: 'explore-card-hunt'
- waitForAnimationToEnd:
    timeout: 4000
- assertVisible:
    id: 'hunt-screen'
- assertVisible: 'Geo-caches'
- tapOn:
    id: 'hunt-back-button'
- waitForAnimationToEnd:
    timeout: 1000

# Events stub.
- tapOn:
    id: 'explore-card-events'
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible:
    id: 'events-screen'
- assertVisible: 'Bitcoin meetups nearby'
- tapOn:
    id: 'events-back-button'
- waitForAnimationToEnd:
    timeout: 1000

# Back on hub — final sanity that round-trip didn't lose state.
- assertVisible: 'Explore'
- assertVisible:
    id: 'explore-card-lessons'
