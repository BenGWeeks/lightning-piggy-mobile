appId: com.lightningpiggy.app.dev
name: Pay 21 sats on an amount-less bolt11
---
# Regression guard for PR #451: tapping Pay on a zero-amount bolt11
# (lnbc1… with no amount prefix — e.g. a "donation" invoice) must
# route through AmountEntryScreen so the user can enter the amount,
# then thread it through NIP-47 pay_invoice as `amount` (msats).
#
# This test covers the whole UI path with 21 sats:
#   - tap Pay on the incoming "Any amount" bubble
#   - tap "Enter amount"
#   - keypad 2 + 1 → assertVisible '21'
#   - confirm → returns to Send view with "21 sats" rendered
#   - Send button becomes enabled
#
# Stops short of tapping Send because the spec-test bolt11 has no
# routable payee — exercising the UI plumbing is enough to guard the
# regression. End-to-end payment lives in manual QA.
#
# Preconditions:
#   - app installed, Metro running, logged in
#   - dev mode + followingOnly=false so the unfriended sender's
#     thread is visible (or sender already friended)
#   - a thread containing the BOLT-11 spec test vector lnbc1pvjluez…
#     This is set up by send-nip17-from-test-account.mjs in the
#     PR #451 evidence-capture flow.

- extendedWaitUntil:
    visible:
      id: 'tab-messages'
    timeout: 30000

- tapOn:
    id: 'tab-messages'
- waitForAnimationToEnd:
    timeout: 3000

# Open the seeded thread (sender's display name from the test-account
# script's kind-0 profile). Once inside, scroll up to surface the
# amount-less bolt11 bubble — newer messages may push it off screen.
- tapOn:
    text: 'Little Piggy'
- waitForAnimationToEnd:
    timeout: 4000
- swipe:
    start: 50%, 30%
    end: 50%, 80%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1500
- swipe:
    start: 50%, 30%
    end: 50%, 80%
    duration: 600
- waitForAnimationToEnd:
    timeout: 1500
- assertVisible: 'Please consider supporting this project'

# Tap the Pay button on the "INVOICE RECEIVED — Any amount" bubble.
# Disambiguate from the lud16 / on-chain Pay buttons via the
# accessibilityLabel that's unique to bolt11 invoice cards.
- tapOn:
    text: 'Pay this invoice'
- waitForAnimationToEnd:
    timeout: 4000

# The SendSheet should open showing the "Enter amount" picker (this
# is the regression we're guarding). Tap it to drill into
# AmountEntryScreen.
- tapOn:
    id: 'send-amount-picker'
- extendedWaitUntil:
    visible:
      id: 'amount-entry-screen'
    timeout: 5000

# Type 21 sats on the in-app keypad.
- tapOn:
    id: 'amount-entry-key-2'
- tapOn:
    id: 'amount-entry-key-1'
- assertVisible: '21'

# Confirm — "Send 21 sats" closes the amount step and returns to
# the SendSheet's main step with the amount echoed back.
- tapOn:
    id: 'amount-entry-confirm'
- waitForAnimationToEnd:
    timeout: 3000
- assertNotVisible:
    id: 'amount-entry-screen'
- assertVisible: '21 sats'

# The Send button should now be enabled. We don't tap it (the
# spec-vector bolt11 is unroutable) — visibility + the absence of
# the "Amount not specified" string is enough to prove the UI path
# wires up correctly.
- assertNotVisible: 'Amount not specified'
