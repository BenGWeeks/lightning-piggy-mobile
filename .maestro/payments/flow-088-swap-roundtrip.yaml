appId: ${APP_ID || 'com.lightningpiggy.app.dev'}
name: Boltz roundtrip — Lightning → on-chain → Lightning (sweep-back)
---
# REAL-MONEY TEST. Wraps the two real-swap tests into a single
# flow that sweeps the swapped sats back to Lightning so the
# fixture set's Lightning balance stays roughly constant across
# runs.
#
# Net cost per run: ~600-1800 sats (Boltz fees + miner fees, both
# directions). Funds always end where they started — at Big Piggy's
# Lightning wallet — minus the fees. This makes the roundtrip the
# right test to run when validating Boltz integration end-to-end
# without bleeding Big Piggy's balance over multiple iterations.
#
# NOT FOR CI. Total runtime can hit 8 minutes (4 each direction
# in the worst case). Manual run (self-contained — leg 1 now types the
# BIP-21 from MAESTRO_ADDR_BIG, no clipboard seeding):
#
#   source .env
#   maestro test -e MAESTRO_ADDR_BIG="$MAESTRO_ADDR_BIG" \
#     .maestro/payments/flow-088-swap-roundtrip.yaml
#
# Preconditions are the union of both legs:
#   - AVD signed in as Big Piggy
#   - ≥30k sats spendable on Lightning (covers leg 1's 25k + fees)
#   - Big Piggy on-chain wallet imported (so leg 2 has somewhere to
#     pull from)
#   - MAESTRO_ADDR_BIG passed via -e (leg 1 types it into the send
#     input; the submarine leg drives TransferSheet, no address needed)

# Leg 1: Lightning → on-chain (reverse swap, 25k sats)
- runFlow:
    file: ../payments/flow-085-swap-reverse-25k.yaml

# Inter-leg breath. Lightning balance settled back at sender; on-
# chain balance bumped by ~24-25k. Give the on-chain indexer a
# moment to surface the new UTXO before TransferSheet polls it for
# the submarine leg's source-balance.
- waitForAnimationToEnd:
    timeout: 5000

# Leg 2: on-chain → Lightning (submarine swap, sweeps back).
- runFlow:
    file: ../payments/flow-089-swap-submarine.yaml

- takeScreenshot: post-roundtrip
