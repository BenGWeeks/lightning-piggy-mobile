appId: com.lightningpiggy.app.dev
name: Set Lightning Address on Wallet
---
# Sets a lightning address on the first wallet via Wallet Settings. LN
# address is per-wallet (#169), not a global account field — each NWC can
# have its own, or none, and the Receive flow reads the selected wallet's
# value. Assumes at least one NWC wallet has been added already (pair
# with test-add-nwc-wallet in a run script if needed).

- waitForAnimationToEnd: { timeout: 10000 }

- tapOn: { id: 'tab-home' }
- waitForAnimationToEnd: { timeout: 3000 }

# Open the active wallet's Settings sheet from the card header icon.
- tapOn: { id: 'wallet-settings' }
- extendedWaitUntil:
    visible: { id: 'wallet-lightning-address-input' }
    timeout: 10000

# Tap twice — BottomSheetTextInput needs the double-focus pattern used
# across the other wizard-style inputs.
- tapOn: { id: 'wallet-lightning-address-input' }
- tapOn: { id: 'wallet-lightning-address-input' }
- eraseText: { charactersToErase: 200 }
- inputText: 'test@getalby.com'
- hideKeyboard
- waitForAnimationToEnd: { timeout: 1000 }

- tapOn: { id: 'wallet-settings-save' }
- waitForAnimationToEnd: { timeout: 3000 }
