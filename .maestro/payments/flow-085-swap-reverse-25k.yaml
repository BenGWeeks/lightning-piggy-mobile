appId: ${APP_ID || 'com.lightningpiggy.app.dev'}
name: Boltz reverse swap — full happy path, 25k sats Lightning → on-chain
---
# REAL-MONEY TEST. Issues a Boltz reverse swap of 25,000 sats from
# the AVD's active Lightning wallet (Big Piggy NWC) to Big Piggy's
# own on-chain address. Costs:
#
#   - Boltz service fee: ~0.5-1.5 % of amount = ~125-375 sats
#   - On-chain miner fee for the claim tx: ~150-500 sats (varies)
#   - Total burn per run: ~300-900 sats
#
# Funds end at MAESTRO_ADDR_BIG (Big Piggy's own on-chain wallet) so
# they remain spendable. Pair with `test-swap-submarine.yaml` —
# or run `test-swap-roundtrip.yaml` — to sweep them back to the
# Lightning side after.
#
# NOT FOR CI. Filename intentionally lacks a CI-friendly marker;
# `.maestro/reporting/run-all.sh` should skip funds-spending tests via a
# pattern like `! -name 'test-swap-reverse-25k.yaml'`. Run manually
# when validating the Boltz happy-path:
#
#   source .env
#   echo -n "bitcoin:${MAESTRO_ADDR_BIG}?amount=0.00025" | xclip -selection clipboard
#   maestro test .maestro/payments/flow-085-swap-reverse-25k.yaml
#
# Preconditions:
#   - AVD signed in as Big Piggy (≥30k sats Lightning balance to cover
#     the 25k swap + Boltz/miner fees + one bolt11 retry buffer)
#   - Active wallet is Big Piggy's NWC (the swap-test designate)
#   - MAESTRO_ADDR_BIG set in .env, clipboard pre-seeded with the
#     bitcoin:<addr>?amount=0.00025 BIP-21
#   - Network reachable to relay.boltz.exchange (Boltz API)

- launchApp:
    clearState: false
- extendedWaitUntil:
    visible:
      id: 'tab-home'
    timeout: 30000

- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 2000

- tapOn:
    id: 'btn-send'
- waitForAnimationToEnd:
    timeout: 3000

- tapOn:
    id: 'send-tab-input'
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: 'send-paste-clipboard'
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: 'send-paste-go'

# Wait for Boltz fee fetch to complete + render — same pattern as
# test-swap-reverse-fee-render.yaml.
- extendedWaitUntil:
    visible:
      text: '.*Swap fee:.*sats.*'
    timeout: 12000

- takeScreenshot: pre-send-25k

# Tap Send. The button has no testID at the time of writing — title
# 'Send' at index 0 is the modal title, the button is index 1. (See
# SendSheet.tsx:1040; future fix: add a testID.)
- tapOn:
    text: 'Send'
    index: 1

# PaymentProgressOverlay walks through:
#   1. Creating swap (Boltz API call) → ~1-3 s
#   2. Paying invoice → up to 60 s for NWC pay_invoice
#   3. Waiting for Boltz lockup tx in mempool → ~10-60 s
#   4. Building + broadcasting the claim tx → ~5-15 s
#   5. Success state
#
# We wait for the "Payment sent!" overlay (success state). Total
# realistic timeout: 4 minutes covers slow mempools / Boltz queue.
- extendedWaitUntil:
    visible: 'Payment sent!'
    timeout: 240000
- takeScreenshot: post-send-25k

# Dismiss the overlay so the AVD is left in a normal state.
- tapOn:
    text: 'OK'
    optional: true
- waitForAnimationToEnd:
    timeout: 2000
