appId: ${APP_ID || 'com.lightningpiggy.app.dev'}
name: Send — fixed-amount LNURL (min = max) skips the amount prompt
---
# Regression test for #833: an LNURL-pay whose server pins the amount
# (minSendable === maxSendable) must NOT show the "Enter amount" picker.
# The Send sheet pre-fills the only valid value and renders it read-only
# (id: send-amount-fixed) with a "Fixed amount" caption.
#
# Fixture: the lnurl1 string below bech32-encodes a commit-SHA-pinned
# raw.githubusercontent.com URL of tests/fixtures/lnurl/pay-fixed-100.json
# (LUD-06 payRequest with minSendable = maxSendable = 100000 msat).
# SHA-pinning makes the URL immutable and repo-owned — it survives branch
# deletion and can't drift, unlike a personal gist. To regenerate after
# editing the fixture: commit it, then
#   node -e "const{bech32}=require('bech32');const u='https://raw.githubusercontent.com/BenGWeeks/lightning-piggy-mobile/<commit-sha>/tests/fixtures/lnurl/pay-fixed-100.json';console.log(bech32.encode('lnurl',bech32.toWords(Buffer.from(u)),2000))"
# No payment is made — the test stops at the details card (the fixture's
# callback host is example.com, so a send attempt would fail anyway).
# Run: maestro --device emulator-5554 test .maestro/payments/flow-119-send-lnurl-fixed-amount.yaml

- launchApp

# First bundle from a cold Metro can take a while.
- waitForAnimationToEnd: { timeout: 10000 }

# The app restores navigation state, so a previous session may have left
# stacked screens (no tab bar) on top — pop back to the tabs first via
# in-app "Go back" arrows, NOT hardware back (at the nav root hardware
# back exits the app). Each round waits for the UI to mount (cold boot
# shows only a spinner, which satisfies waitForAnimationToEnd), and the
# whole round no-ops once the tab bar is reachable.
- repeat:
    times: 3
    commands:
      - runFlow:
          when:
            notVisible: { id: 'tab-home' }
          commands:
            # Generous: a restored conversation can freeze the JS thread
            # for >30s while the DM inbox decrypts (#695).
            - extendedWaitUntil:
                visible: 'Go back'
                timeout: 30000
                optional: true
            - runFlow:
                when:
                  visible: 'Go back'
                commands:
                  - tapOn: 'Go back'
                  - waitForAnimationToEnd: { timeout: 2000 }
# A payment-received BrandedAlert can be sitting on top after launch
# (test Piggies receive real sats) — dismiss it before reaching for tabs.
- runFlow:
    when:
      visible: { id: 'branded-alert-button-0' }
    commands:
      - tapOn: { id: 'branded-alert-button-0' }
      - waitForAnimationToEnd: { timeout: 2000 }

- extendedWaitUntil:
    visible: { id: 'tab-home' }
    timeout: 30000
- tapOn: { id: 'tab-home' }
- tapOn: { id: 'btn-send' }
- waitForAnimationToEnd: { timeout: 4000 }

# Paste the fixed-amount LNURL via the in-app clipboard button. Do NOT
# use inputText here: Maestro's synthetic keystrokes race RN's controlled
# TextInput and the long bech32 string arrives scrambled (one wrong char
# = checksum failure). Same workaround as flow-115-add-wallet-via-paste.
#
# Prerequisite: seed the host clipboard, then focus the emulator window
# once so it syncs to the device (run before `maestro test`):
#   LNURL='lnurl1dp68gurn8ghj7unpwuhxw6t5dp6kyatnv4exxmmww3jkuapwvdhk6t6zv4hyw4m9v44hxtmvd9nksarwd9hxwttsd9nkw7fdd4hky6tvv5hkzde3v4jrjwtpxp3nwwtzvc6rxdmxx56kzdtzv93rge3kvgcrydphvvckvwrzvgcj7ar9wd68xtmxd9u8gatjv4ej7mrww4exctmsv9uj6enf0pjkgtf3xqczu6nndahq8mer97'
#   qdbus6 org.kde.klipper /klipper org.kde.klipper.klipper.setClipboardContents "$LNURL" \
#     || echo -n "$LNURL" | wl-copy   # or: xclip -selection clipboard
#   xdotool windowactivate $(xdotool search --name "Android Emulator" | head -1)
- tapOn: { id: 'send-tab-input' }
# handlePaste calls processInput directly — no Go tap needed (and the
# paste section unmounts as soon as the input is recognised).
- tapOn: { id: 'send-paste-clipboard' }
- waitForAnimationToEnd: { timeout: 1500 }

# Resolution fetches the payRequest over the network, then the fixed
# amount renders read-only — no picker, value pre-filled.
- extendedWaitUntil:
    visible: { id: 'send-amount-fixed' }
    timeout: 15000
- assertVisible: '100 sats'
- assertVisible: 'Fixed amount'
- assertNotVisible: { id: 'send-amount-picker' }

# Send must already be enabled (the pre-fill satisfies canSend) — the
# button is tappable without ever visiting AmountEntryScreen.
- assertVisible:
    text: 'Send'
    enabled: true
