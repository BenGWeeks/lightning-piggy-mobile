appId: ${APP_ID || 'com.lightningpiggy.app.dev'}
name: Map sub-screen renders with WebView and recenter control
---
# Smoke flow for the Map sub-screen: grant foreground location, open
# Explore → Map, confirm the WebView mounts and the recenter control is
# present. The actual marker count varies with the user's real position
# (this flow doesn't mock BTC Map), so we only assert structural elements
# rather than specific merchant pins. Marker-tap verification lives in
# test-map-tap-merchant.yaml once the fixture relay is in place
# (milestone 8).
#
# Run: maestro test .maestro/map/flow-042-map-foreground-render.yaml

- launchApp:
    permissions:
      location: allow

- waitForAnimationToEnd:
    timeout: 10000

- tapOn:
    id: 'tab-explore'
- waitForAnimationToEnd:
    timeout: 1500

- tapOn:
    id: 'explore-card-map'
- waitForAnimationToEnd:
    timeout: 3000

- assertVisible:
    id: 'map-screen'
# MapLibre swap (#552 / #563) removed the WebView host + the manual
# recenter button (LibreMiniMap owns recenter via libre-minimap-recenter).
# map-screen above already confirms we landed; libre-minimap-recenter
# confirms the new chrome rendered.
- assertVisible:
    id: 'libre-minimap-recenter'
- assertVisible:
    id: 'map-back-button'

- tapOn:
    id: 'map-back-button'
- waitForAnimationToEnd:
    timeout: 1000
- assertVisible:
    id: 'explore-card-map'
