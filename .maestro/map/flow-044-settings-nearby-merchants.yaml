appId: com.lightningpiggy.app.dev
name: Nearby merchants — toggle, radius preset, quiet hours
---
# Walks through the new "Nearby merchants" drawer settings introduced for
# the geofence half of #467. Verifies that the screen renders, the radius
# preset chips switch (visual selection), and the quiet-hours toggle
# flips. The actual permission grant + geofence-task registration are
# not stable enough to assert under Maestro (they depend on whether the
# emulator has Google Play Services + a configured location), so the
# permission flow is left to manual smoke test in milestone 8.
#
# Run: maestro test .maestro/map/flow-044-settings-nearby-merchants.yaml

- waitForAnimationToEnd:
    timeout: 10000

# Open the account drawer via the Home tab's avatar header. The drawer
# has a `drawer-row-nearby` row that takes us into the new screen.
- tapOn:
    id: 'tab-home'
- waitForAnimationToEnd:
    timeout: 1500

# The avatar in the TabHeader opens the drawer (#100). The ProfileIcon
# component uses testID `profile-icon` (Copilot review #488 caught the
# wrong id we had earlier). Falling back to a swipe is still here as a
# defensive measure for builds where the icon hasn't rendered yet.
- tapOn:
    id: 'profile-icon'
    optional: true
- swipe:
    start: 95%, 30%
    end: 30%, 30%
    duration: 400
    optional: true
- waitForAnimationToEnd:
    timeout: 1000

- tapOn:
    id: 'drawer-row-nearby'
- waitForAnimationToEnd:
    timeout: 1500

- assertVisible: 'Nearby merchants'
- assertVisible: 'Alert me near Bitcoin shops'
- assertVisible:
    id: 'settings-nearby-merchants-toggle'

# Tap a radius preset and check selection persists by re-reading the chip
# (the chip's text doesn't change but its accessibilityState does — we
# rely on visual + a follow-up assertion that the 250m chip is present).
- tapOn:
    id: 'settings-alert-radius-250'
- waitForAnimationToEnd:
    timeout: 600
- assertVisible:
    id: 'settings-alert-radius-250'

# Quiet hours toggle.
- tapOn:
    id: 'settings-quiet-hours-toggle'
- waitForAnimationToEnd:
    timeout: 600
- assertVisible:
    id: 'settings-quiet-hours-toggle'

# Back out of the drawer screen.
- tapOn:
    id: 'account-back-button'
- waitForAnimationToEnd:
    timeout: 1000
